components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token-based authentication. Include the token in the Authorization header.

  parameters:
    EmployeeId:
      name: id
      in: path
      required: true
      description: Unique employee identifier
      schema:
        type: string

  responses:
    UnauthorizedError:
      description: Authentication required or authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        statusCode:
          type: number
        details:
          type: string

    Pagination:
      type: object
      properties:
        currentPage:
          type: number
        totalPages:
          type: number
        totalItems:
          type: number
        itemsPerPage:
          type: number
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean

    Employee:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        departmentId:
          type: string
        # Both `position` and `jobTitle` are returned for compatibility
        position:
          type: string
        jobTitle:
          type: string
        salary:
          type: number
        hireDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, on_leave, terminated]
        department:
          type: object
          properties:
            id:
              type: string
            name:
              type: string

    EmployeeInput:
      type: object
      required:
        - firstName
        - lastName
        - email
        - departmentId
        - position
        - salary
        - hireDate
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        departmentId:
          type: string
        position:
          type: string
        salary:
          type: number
        hireDate:
          type: string
          format: date
        phoneNumber:
          type: string

    EmployeeUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        position:
          type: string
        salary:
          type: number
        departmentId:
          type: string
        phoneNumber:
          type: string
        status:
          type: string
          enum: [active, inactive, on_leave, terminated]

    Department:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        managerId:
          type: string
        budget:
          type: number
        description:
          type: string
        location:
          type: string
        employeeCount:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DepartmentInput:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
        code:
          type: string
        managerId:
          type: string
        budget:
          type: number
        description:
          type: string
        location:
          type: string

    Payroll:
      type: object
      properties:
        id:
          type: string
        employeeId:
          type: string
        employeeName:
          type: string
        payPeriodStart:
          type: string
          format: date
        payPeriodEnd:
          type: string
          format: date
        grossPay:
          type: number
        deductions:
          type: number
        taxWithheld:
          type: number
        netPay:
          type: number
        status:
          type: string
          enum: [pending, approved, paid]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PayrollInput:
      type: object
      required:
        - employeeId
        - payPeriodStart
        - payPeriodEnd
      properties:
        employeeId:
          type: string
        payPeriodStart:
          type: string
          format: date
        payPeriodEnd:
          type: string
          format: date
        deductions:
          type: number
        bonus:
          type: number
        overtime:
          type: number

    Customer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        creditLimit:
          type: number
        currentBalance:
          type: number
        paymentTerms:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required:
        - name
        - email
        - phone
        - address
        - creditLimit
        - paymentTerms
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        creditLimit:
          type: number
        paymentTerms:
          type: string

    Invoice:
      type: object
      properties:
        id:
          type: string
        invoiceNumber:
          type: string
        customerId:
          type: string
        customerName:
          type: string
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        subtotal:
          type: number
        taxAmount:
          type: number
        totalAmount:
          type: number
        paidAmount:
          type: number
        balanceDue:
          type: number
        status:
          type: string
          enum: [draft, pending, paid, overdue, cancelled]
        items:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
              amount:
                type: number

    InvoiceInput:
      type: object
      required:
        - customerId
        - dueDate
        - items
        - subtotal
      properties:
        customerId:
          type: string
        # `invoiceDate` is the canonical field name; `issueDate` is accepted for backward compatibility
        invoiceDate:
          type: string
          format: date
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
              amount:
                type: number
        subtotal:
          type: number
        # `tax` is the canonical field name; `taxAmount` is accepted for backward compatibility
        tax:
          type: number
        taxAmount:
          type: number
        # `total` is the canonical field name; `totalAmount` is accepted for backward compatibility
        total:
          type: number
        totalAmount:
          type: number

    Vendor:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        paymentTerms:
          type: string
        category:
          type: string
        rating:
          type: number
        status:
          type: string
          enum: [active, inactive, suspended]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VendorInput:
      type: object
      required:
        - name
        - email
        - phone
        - address
        - paymentTerms
        - category
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        paymentTerms:
          type: string
        category:
          type: string

    PurchaseOrder:
      type: object
      properties:
        id:
          type: string
        poNumber:
          type: string
        vendorId:
          type: string
        vendorName:
          type: string
        orderDate:
          type: string
          format: date
        expectedDeliveryDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, pending_approval, approved, placed, received, cancelled]
        items:
          type: array
          items:
            type: object
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PurchaseOrderInput:
      type: object
      required:
        - vendorId
        - orderDate
        - expectedDeliveryDate
        - items
        - subtotal
        - tax
        - total
      properties:
        vendorId:
          type: string
        orderDate:
          type: string
          format: date
        expectedDeliveryDate:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              itemId:
                type: string
              description:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
              amount:
                type: number
        subtotal:
          type: number
        tax:
          type: number
        total:
          type: number

    Shipment:
      type: object
      properties:
        # Both `shipmentId` and `id` are returned for compatibility
        shipmentId:
          type: string
        id:
          type: string
        orderId:
          type: string
        trackingNumber:
          type: string
        carrier:
          type: string
        status:
          type: string
          enum: [pending, dispatched, in_transit, delivered, cancelled]
        origin:
          type: string
        destination:
          type: string
        # `estimatedDeliveryDate` is the canonical field; `estimatedDelivery` also returned
        estimatedDeliveryDate:
          type: string
          format: date
        estimatedDelivery:
          type: string
          format: date
        actualDeliveryDate:
          type: string
          format: date
        shipDate:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
        totalWeight:
          type: number
        shippingCost:
          type: number
        createdAt:
          type: string
          format: date-time

    ShipmentInput:
      type: object
      required:
        - orderId
        - carrier
        - trackingNumber
        - origin
        - destination
        - estimatedDeliveryDate
        - items
      properties:
        orderId:
          type: string
        carrier:
          type: string
        trackingNumber:
          type: string
        origin:
          type: string
        destination:
          type: string
        estimatedDeliveryDate:
          type: string
          format: date
        items:
          type: array
          items:
            type: object
            properties:
              itemId:
                type: string
              quantity:
                type: number

    InventoryItem:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        # `quantity` and `quantityOnHand` are the same value; both are returned for compatibility
        quantity:
          type: number
        quantityOnHand:
          type: number
        reservedQuantity:
          type: number
        availableQuantity:
          type: number
        unitPrice:
          type: number
        reorderPoint:
          type: number
        reorderQuantity:
          type: number
        location:
          type: string
        status:
          type: string
          enum: [active, discontinued, out_of_stock]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InventoryItemInput:
      type: object
      required:
        - sku
        - name
        - category
        - quantity
        - unitPrice
        - reorderPoint
        - reorderQuantity
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        quantity:
          type: number
        reservedQuantity:
          type: number
        unitPrice:
          type: number
        reorderPoint:
          type: number
        reorderQuantity:
          type: number
        location:
          type: string

    Transaction:
      type: object
      properties:
        id: {type: string}
        date: {type: string, format: date}
        description: {type: string}
        amount: {type: number}
        type:
          type: string
          enum: [debit, credit]

    Budget:
      type: object
      properties:
        id: {type: string}
        departmentId: {type: string}
        fiscalYear: {type: number}
        quarter: {type: number}
        allocatedAmount: {type: number}
        spentAmount: {type: number}
        remainingAmount: {type: number}
        status:
          type: string
          enum: [active, closed]

    BudgetInput:
      type: object
      required: [departmentId, fiscalYear, allocatedAmount]
      properties:
        departmentId: {type: string}
        fiscalYear: {type: number}
        quarter: {type: number}
        allocatedAmount: {type: number}

