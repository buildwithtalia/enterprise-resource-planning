  **Response Fields:**

  | Field | Type | Description |
  |-------|------|-------------|
  | data | array | Array of purchase order objects |
  | data[].id | string | Unique purchase order identifier |
  | data[].poNumber | string | Human-readable PO number |
  | data[].vendorId | string | Vendor identifier |
  | data[].vendorName | string | Vendor company name |
  | data[].orderDate | string | Order creation date |
  | data[].expectedDeliveryDate | string | Expected delivery date |
  | data[].actualDeliveryDate | string | Actual delivery date (null if not received) |
  | data[].status | string | Current PO status |
  | data[].subtotal | number | Subtotal before tax |
  | data[].tax | number | Tax amount |
  | data[].total | number | Total amount including tax |
  | data[].itemCount | number | Number of line items |
  | data[].createdBy | string | User who created the PO |
  | data[].approvedBy | string | User who approved the PO |
  | data[].createdAt | string | Creation timestamp (ISO 8601) |
  | data[].updatedAt | string | Last update timestamp (ISO 8601) |
  | pagination | object | Pagination metadata |
  | summary | object | Summary statistics for the result set |

  ### Error Responses

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Unauthorized",
    "message": "Authentication token is required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Forbidden",
    "message": "User does not have permission to view purchase orders",
    "requiredRole": "procurement_manager, procurement_staff, warehouse_manager, or admin"
  }
  ```

  **400 Bad Request** - Invalid query parameters
  ```json
  {
    "error": "Bad Request",
    "message": "Invalid status value",
    "validValues": ["draft", "pending_approval", "approved", "placed", "received", "cancelled"]
  }
  ```

  ## Use Cases

  - **Order Tracking**: Monitor status of all purchase orders
  - **Vendor Analysis**: Review orders by vendor for spend analysis
  - **Approval Queue**: View pending purchase orders requiring approval
  - **Delivery Monitoring**: Track expected vs actual delivery dates
  - **Financial Reporting**: Analyze procurement spending patterns
  - **Audit Trail**: Review historical purchase order data
  - **Dashboard Views**: Display purchase order metrics and KPIs

  ## Notes

  - Results are paginated by default (50 items per page)
  - Use filtering to narrow results for better performance
  - Status breakdown provides quick overview of order pipeline
  - Summary statistics are calculated based on filtered results
  - Sorting by orderDate (desc) is default if not specified
  - Consider using date ranges for large datasets
