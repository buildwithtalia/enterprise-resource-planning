description: |-
  ## Purpose

  Retrieves a complete list of all purchase orders in the procurement system. This endpoint provides procurement teams with access to the entire purchase order database, enabling order tracking, status monitoring, and procurement analytics across all vendors and time periods.

  ## Authentication

  **Required:** Yes

  **Roles:** `procurement_manager`, `procurement_staff`, `warehouse_manager`, `admin`

  Users must have procurement, warehouse, or administrative privileges to view purchase orders.

  ## Request Parameters

  ### Headers

  | Header | Value | Required | Description |
  |--------|-------|----------|-------------|
  | Authorization | Bearer {token} | Yes | JWT authentication token |

  ### Query Parameters

  Optional filtering and pagination parameters:

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | status | string | No | Filter by status (draft, pending_approval, approved, placed, received, cancelled) |
  | vendorId | string | No | Filter by vendor ID |
  | startDate | string | No | Filter by order date from (YYYY-MM-DD) |
  | endDate | string | No | Filter by order date to (YYYY-MM-DD) |
  | minAmount | number | No | Filter by minimum total amount |
  | maxAmount | number | No | Filter by maximum total amount |
  | page | number | No | Page number for pagination (default: 1) |
  | limit | number | No | Items per page (default: 50, max: 100) |
  | sortBy | string | No | Sort field (orderDate, total, status) |
  | sortOrder | string | No | Sort order (asc, desc) |

  ### Example Request

  ```http
  GET {{baseUrl}}/api/procurement/purchase-orders?status=approved&vendorId=vendor-123&limit=20
  Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  ```

  ## Response

  ### Success Response (200 OK)

  Returns an array of purchase order objects with pagination metadata:

