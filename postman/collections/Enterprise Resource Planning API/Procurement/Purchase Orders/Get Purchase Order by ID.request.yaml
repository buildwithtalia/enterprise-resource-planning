description: |-
  ## Purpose

  Retrieves detailed information for a specific purchase order by its unique identifier. This endpoint provides comprehensive purchase order data including line items, pricing, vendor details, status history, and delivery information, enabling detailed order tracking and management.

  ## Authentication

  **Required:** Yes

  **Roles:** `procurement_manager`, `procurement_staff`, `warehouse_manager`, `admin`

  Users must have procurement, warehouse, or administrative privileges to view purchase order details.

  ## Request Parameters

  ### Headers

  | Header | Value | Required | Description |
  |--------|-------|----------|-------------|
  | Authorization | Bearer {token} | Yes | JWT authentication token |

  ### Path Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | id | string | Yes | Unique purchase order identifier (e.g., po-123) |

  ### Example Request

  ```http
  GET {{baseUrl}}/api/procurement/purchase-orders/po-123
  Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  ```

  ## Response

  ### Success Response (200 OK)

  Returns a detailed purchase order object:

  ```json
  {
    "id": "po-123",
    "poNumber": "PO-2024-0123",
    "vendorId": "vendor-123",
    "vendorName": "Office Supplies Inc",
    "vendorEmail": "sales@officesupplies.com",
    "vendorPhone": "+1-555-0456",
    "orderDate": "2024-01-10",
    "expectedDeliveryDate": "2024-01-25",
    "actualDeliveryDate": null,
    "status": "approved",
    "items": [
      {
        "itemId": "item-456",
        "sku": "CHAIR-ERG-001",
        "description": "Ergonomic Office Chair",
        "quantity": 20,
        "unitPrice": 150,
        "amount": 3000,
        "receivedQuantity": 0,
        "status": "pending"
      },
      {
        "itemId": "item-789",
        "sku": "DESK-STD-001",
        "description": "Standard Office Desk",
        "quantity": 10,
        "unitPrice": 200,
        "amount": 2000,
        "receivedQuantity": 0,
        "status": "pending"
      }
    ],
    "subtotal": 5000,
    "tax": 400,
    "total": 5400,
    "notes": "Please deliver to warehouse loading dock",
    "shippingAddress": "123 Company Way, City, State 12345",
    "paymentTerms": "Net 30",
    "createdBy": "user-456",
    "createdByName": "John Smith",
    "approvedBy": "user-789",
    "approvedByName": "Jane Doe",
    "approvedAt": "2024-01-10T14:30:00Z",
    "placedAt": null,
    "receivedAt": null,
    "statusHistory": [
      {
        "status": "draft",
        "timestamp": "2024-01-10T09:00:00Z",
        "userId": "user-456",
        "userName": "John Smith"
      },
      {
        "status": "pending_approval",
        "timestamp": "2024-01-10T09:15:00Z",
        "userId": "user-456",
        "userName": "John Smith"
      },
      {
        "status": "approved",
        "timestamp": "2024-01-10T14:30:00Z",
