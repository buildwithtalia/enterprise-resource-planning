$kind: http-request
description: Update an inventory item. Requires 'warehouse_manager' or 'admin' role.
url: "{{baseUrl}}/api/inventory/items/:id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  id: item-123
body:
  type: text
  content: |-
    {
      "unitPrice": 175,
      "reorderPoint": 25,
      "location": "Warehouse B, Aisle 5"
    }
order: 5000
