$kind: http-request
description: Fulfill a reservation by removing stock. Requires 'warehouse_manager' or 'admin' role.
url: '{{baseUrl}}/api/inventory/stock/fulfill'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "reservationId": "res-123",
      "itemId": "item-123",
      "quantity": 10
    }
order: 4000
