$kind: http-request
description: Fulfill a reservation by removing stock. Requires 'warehouse_manager' or 'admin' role.
url: "{{baseUrl}}/api/inventory/items/:id/fulfill"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  id: item-123
body:
  type: text
  content: |-
    {
      "quantity": 10
    }
order: 4000
