$kind: http-request
description: Receive new stock into inventory. Requires 'warehouse_manager' or 'admin' role.
url: '{{baseUrl}}/api/inventory/stock/receive'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "itemId": "item-123",
      "quantity": 50,
      "purchaseOrderId": "po-456"
    }
order: 5000
