  ### Error Responses

  **400 Bad Request** - Invalid date format
  ```json
  {
    "error": "Invalid date format. Use YYYY-MM-DD"
  }
  ```

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Authentication required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Insufficient permissions to generate trial balance"
  }
  ```

  ## Use Cases

  - **Period Closing**: Verify books balance before closing period
  - **Financial Statement Preparation**: Foundation for preparing financial statements
  - **Error Detection**: Identify posting errors and imbalances
  - **Audit Preparation**: Provide summary of all account balances for auditors
  - **Management Reporting**: Quick overview of financial position
