description: |-
  ## Purpose

  Generates a trial balance report showing the balances of all accounts in the general ledger. The trial balance is a fundamental accounting report that verifies the equality of debits and credits, ensuring the books are in balance. This report is essential for financial statement preparation and period-end closing.

  ## Authentication

  **Required Role:** `accountant`, `finance_manager`, `admin`

  **Authentication Type:** Bearer Token

  **Header:** `Authorization: Bearer {{authToken}}`

  ## Request Parameters

  ### Query Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | asOfDate | string | No | Generate trial balance as of this date (YYYY-MM-DD, default: today) |
  | includeZeroBalances | boolean | No | Include accounts with zero balance (default: false) |

  ### Example Requests

  **Get current trial balance:**
  ```
  GET {{baseUrl}}/api/accounting/trial-balance
  ```

  **Get trial balance as of specific date:**
  ```
  GET {{baseUrl}}/api/accounting/trial-balance?asOfDate=2024-01-31
  ```

  **Include zero balance accounts:**
  ```
  GET {{baseUrl}}/api/accounting/trial-balance?includeZeroBalances=true
  ```

  ## Response

