description: |-
  ## Purpose

  Retrieves a list of all customers in the billing system with optional filtering capabilities. This endpoint allows billing managers and administrators to view and search through customer records, filter by status, and access customer information for billing operations.

  ## Authentication

  **Required Role:** `billing_manager` or `admin`

  **Authentication Type:** Bearer Token

  **Header:** `Authorization: Bearer {{authToken}}`

  ## Request Parameters

  ### Query Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | status | string | No | Filter customers by status (active, inactive, suspended) |
  | limit | number | No | Maximum number of results to return (default: 50, max: 100) |
  | offset | number | No | Number of records to skip for pagination (default: 0) |
  | search | string | No | Search by customer name or email |
  | sortBy | string | No | Field to sort by (name, email, createdAt, creditLimit) |
  | sortOrder | string | No | Sort order (asc, desc) (default: asc) |

  ### Example Requests

  **Get all active customers:**
  ```
  GET {{baseUrl}}/api/billing/customers?status=active
  ```

  **Get customers with pagination:**
  ```
  GET {{baseUrl}}/api/billing/customers?limit=20&offset=40
  ```

  **Search for specific customer:**
  ```
  GET {{baseUrl}}/api/billing/customers?search=acme
  ```

  **Get sorted customer list:**
  ```
  GET {{baseUrl}}/api/billing/customers?sortBy=creditLimit&sortOrder=desc
  ```

  ## Response

  ### Success Response (200 OK)

