  **Response Fields:**

  | Field | Type | Description |
  |-------|------|-------------|
  | shipmentId | string | Unique shipment identifier |
  | orderId | string | Associated order identifier |
  | trackingNumber | string | Carrier tracking number |
  | carrier | string | Shipping carrier name |
  | carrierService | string | Specific carrier service used |
  | status | string | Current shipment status |
  | origin | object | Origin address details |
  | destination | object | Destination address and contact details |
  | items | array | List of items in shipment |
  | packageDetails | object | Package specifications |
  | dates | object | Important dates and timestamps |
  | statusHistory | array | Complete history of status changes |
  | currentLocation | object | Current shipment location |
  | costs | object | Shipping cost breakdown |
  | metadata | object | Additional shipment information |

  ### Error Responses

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Unauthorized",
    "message": "Authentication token is required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Forbidden",
    "message": "User does not have permission to view shipment details"
  }
  ```

  **404 Not Found** - Shipment does not exist
  ```json
  {
    "error": "Not Found",
    "message": "Shipment with ID 'ship-123' not found"
  }
  ```

  ## Use Cases

  - **Customer Service**: Provide detailed tracking information to customers
  - **Shipment Tracking**: Monitor individual shipment progress
  - **Delivery Verification**: Confirm shipment details and delivery status
  - **Issue Resolution**: Investigate shipment problems or delays
  - **Audit Trail**: Review complete shipment history
  - **Location Tracking**: Track current shipment location
  - **Cost Analysis**: Review shipping costs for specific shipments
  - **Documentation**: Generate shipment documentation and reports

  ## Notes

  - Returns complete shipment history including all status changes
  - Status history is ordered chronologically (oldest to newest)
  - Timestamps are in UTC (ISO 8601 format)
  - Current location reflects the most recent tracking scan
  - Item details include SKU, quantity, weight, and value
  - Package details include total weight and dimensions
  - Cost breakdown includes shipping and insurance costs
  - Metadata includes creator information and special instructions
  - Customer notification status is tracked
  - Tracking number can be used with carrier's tracking system
