description: |-
  ## Purpose

  Retrieves detailed information about a specific shipment using its unique identifier. This endpoint provides comprehensive shipment data including current status, location history, item details, and tracking information. Essential for detailed shipment tracking and customer service inquiries.

  ## Authentication

  **Required:** Yes

  **Roles:** `warehouse_manager`, `logistics_coordinator`, `customer_service`, `admin`

  Users must have appropriate logistics or customer service privileges to view shipment details.

  ## Request Parameters

  ### Headers

  | Header | Value | Required | Description |
  |--------|-------|----------|-------------|
  | Authorization | Bearer {token} | Yes | JWT authentication token |

  ### Path Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | id | string | Yes | Unique shipment identifier (e.g., ship-123) |

  ### Example Request

  ```
  GET {{baseUrl}}/api/supply-chain/shipments/ship-123
  Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  ```

  ## Response

