      "totalShipments": 98,
      "byStatus": {
        "pending": 12,
        "dispatched": 8,
        "in_transit": 35,
        "delivered": 40,
        "cancelled": 3
      },
      "totalShippingCost": 4250.00,
      "averageDeliveryTime": 3.2
    }
  }
  ```

  **Response Fields:**

  | Field | Type | Description |
  |-------|------|-------------|
  | shipments | array | Array of shipment objects |
  | shipmentId | string | Unique shipment identifier |
  | orderId | string | Associated order identifier |
  | trackingNumber | string | Carrier tracking number |
  | carrier | string | Shipping carrier name |
  | status | string | Current shipment status |
  | origin | string | Shipment origin address |
  | destination | string | Shipment destination address |
  | estimatedDeliveryDate | string | Expected delivery date (YYYY-MM-DD) |
  | actualDeliveryDate | string | Actual delivery date or null |
  | itemCount | number | Number of items in shipment |
  | totalWeight | number | Total weight in pounds |
  | shippingCost | number | Cost of shipping |
  | createdAt | string | Creation timestamp (ISO 8601) |
  | lastUpdated | string | Last update timestamp (ISO 8601) |
  | currentLocation | string | Current shipment location |
  | pagination | object | Pagination metadata |
  | summary | object | Summary statistics |

  ### Error Responses

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Unauthorized",
    "message": "Authentication token is required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Forbidden",
    "message": "User does not have permission to view shipments",
    "requiredRole": "warehouse_manager, logistics_coordinator, or admin"
  }
  ```

  **400 Bad Request** - Invalid query parameters
  ```json
  {
    "error": "Bad Request",
    "message": "Invalid query parameters",
    "details": [
      "status must be one of: pending, dispatched, in_transit, delivered, cancelled",
      "limit must be between 1 and 100"
    ]
  }
  ```

  ## Use Cases

  - **Shipment Monitoring**: View all active shipments and their current status
  - **Logistics Dashboard**: Display real-time shipment data on dashboards
  - **Performance Analysis**: Analyze shipment patterns and delivery performance
  - **Carrier Comparison**: Compare shipment volumes across different carriers
  - **Status Tracking**: Monitor shipments by status for operational planning
  - **Date Range Reports**: Generate reports for specific time periods
  - **Audit Trail**: Review historical shipment records
  - **Exception Management**: Identify delayed or problematic shipments

  ## Notes

  - Results are paginated by default with 50 shipments per page
  - Maximum limit per page is 100 shipments
  - Default sort order is by creation date (newest first)
  - Filtering by multiple parameters uses AND logic
  - Summary statistics reflect the filtered dataset
  - Timestamps are in UTC (ISO 8601 format)
  - Cancelled shipments are included unless filtered out
  - Use status filter to focus on specific shipment states
  - Combine filters for precise queries (e.g., carrier + status + date range)
url: "{{baseUrl}}/api/supply-chain/shipments"
method: GET
