description: |-
  ## Purpose

  Retrieves a complete list of all shipments in the system with optional filtering and pagination capabilities. This endpoint provides comprehensive visibility into all shipment activities, enabling logistics managers to monitor, track, and analyze shipment operations across the entire supply chain.

  ## Authentication

  **Required:** Yes

  **Roles:** `warehouse_manager`, `logistics_coordinator`, `admin`

  Users must have warehouse management, logistics coordination, or administrative privileges to view shipments.

  ## Request Parameters

  ### Headers

  | Header | Value | Required | Description |
  |--------|-------|----------|-------------|
  | Authorization | Bearer {token} | Yes | JWT authentication token |

  ### Query Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | status | string | No | Filter by shipment status (pending, dispatched, in_transit, delivered, cancelled) |
  | carrier | string | No | Filter by carrier name (e.g., FedEx, UPS, DHL) |
  | startDate | string | No | Filter shipments created after this date (YYYY-MM-DD) |
  | endDate | string | No | Filter shipments created before this date (YYYY-MM-DD) |
  | page | number | No | Page number for pagination (default: 1) |
  | limit | number | No | Number of results per page (default: 50, max: 100) |
  | sortBy | string | No | Sort field (createdAt, estimatedDeliveryDate, status) |
  | sortOrder | string | No | Sort order (asc, desc) - default: desc |

  ### Example Request

  ```
  GET {{baseUrl}}/api/supply-chain/shipments?status=in_transit&carrier=FedEx&page=1&limit=20
  Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  ```

  ## Response

  ### Success Response (200 OK)

  Returns paginated list of shipments:

  ```json
  {
    "shipments": [
      {
        "shipmentId": "ship-789",
        "orderId": "order-123",
        "trackingNumber": "1234567890",
        "carrier": "FedEx",
        "status": "in_transit",
        "origin": "Warehouse A, City, State",
        "destination": "Customer Address, City, State",
        "estimatedDeliveryDate": "2024-01-20",
        "actualDeliveryDate": null,
        "itemCount": 5,
        "totalWeight": 12.5,
        "shippingCost": 45.00,
        "createdAt": "2024-01-15T10:30:00Z",
        "lastUpdated": "2024-01-16T14:20:00Z",
        "currentLocation": "Distribution Center, City, State"
      },
      {
        "shipmentId": "ship-790",
        "orderId": "order-124",
        "trackingNumber": "0987654321",
        "carrier": "UPS",
        "status": "delivered",
        "origin": "Warehouse B, City, State",
        "destination": "Business Address, City, State",
        "estimatedDeliveryDate": "2024-01-18",
        "actualDeliveryDate": "2024-01-17",
        "itemCount": 3,
        "totalWeight": 8.2,
        "shippingCost": 32.50,
        "createdAt": "2024-01-14T09:15:00Z",
        "lastUpdated": "2024-01-17T16:45:00Z",
        "currentLocation": "Delivered"
      }
    ],
    "pagination": {
      "currentPage": 1,
      "totalPages": 5,
      "totalShipments": 98,
      "shipmentsPerPage": 20,
