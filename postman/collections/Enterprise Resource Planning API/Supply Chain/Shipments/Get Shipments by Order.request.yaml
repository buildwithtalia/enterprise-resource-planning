description: |-
  ## Purpose

  Retrieves all shipments associated with a specific order. This endpoint is essential for orders that are split into multiple shipments or require tracking of partial deliveries. Provides complete visibility into all shipments related to a single order.

  ## Authentication

  **Required:** Yes

  **Roles:** `warehouse_manager`, `logistics_coordinator`, `customer_service`, `admin`

  Users must have appropriate logistics or customer service privileges to view order shipments.

  ## Request Parameters

  ### Headers

  | Header | Value | Required | Description |
  |--------|-------|----------|-------------|
  | Authorization | Bearer {token} | Yes | JWT authentication token |

  ### Path Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | orderId | string | Yes | Unique order identifier (e.g., order-123) |

  ### Example Request

  ```
  GET {{baseUrl}}/api/supply-chain/shipments/order/order-123
  Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  ```

  ## Response

