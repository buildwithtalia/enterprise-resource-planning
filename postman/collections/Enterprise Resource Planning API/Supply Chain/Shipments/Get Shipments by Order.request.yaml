  **Response Fields:**

  | Field | Type | Description |
  |-------|------|-------------|
  | orderId | string | Order identifier |
  | orderTotal | number | Total order value |
  | orderDate | string | Order creation date (YYYY-MM-DD) |
  | customerName | string | Customer name |
  | shipmentCount | number | Total number of shipments |
  | allDelivered | boolean | Whether all shipments are delivered |
  | shipments | array | Array of shipment objects |
  | summary | object | Aggregated shipment statistics |
  | deliveryAddress | object | Delivery address details |

  ### Error Responses

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Unauthorized",
    "message": "Authentication token is required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Forbidden",
    "message": "User does not have permission to view order shipments"
  }
  ```

  **404 Not Found** - Order not found
  ```json
  {
    "error": "Not Found",
    "message": "Order with ID 'order-123' not found"
  }
  ```

  **404 Not Found** - No shipments for order
  ```json
  {
    "error": "Not Found",
    "message": "No shipments found for order 'order-123'",
    "suggestion": "Order may not have been shipped yet"
  }
  ```

  ## Use Cases

  - **Order Tracking**: Track all shipments for a customer order
  - **Split Shipments**: Monitor orders split across multiple shipments
  - **Partial Deliveries**: Track partial order fulfillment
  - **Customer Service**: Provide complete order shipment status to customers
  - **Delivery Coordination**: Coordinate multiple shipments to same destination
  - **Order Completion**: Verify all order items have been shipped
  - **Shipping Analysis**: Analyze shipping patterns for specific orders
  - **Issue Resolution**: Investigate shipment issues at order level

  ## Notes

  - Orders may have multiple shipments if items ship from different warehouses
  - Large orders may be split into multiple shipments for logistics efficiency
  - Summary provides aggregated statistics across all shipments
  - Percentage delivered calculated based on number of shipments
  - All shipments share the same delivery address
  - Each shipment has its own tracking number and carrier
  - Shipments may have different estimated delivery dates
  - Status of each shipment is tracked independently
  - Total shipping cost is sum of all shipment costs
  - All items shipped indicator confirms complete order fulfillment
