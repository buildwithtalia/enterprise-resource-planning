description: |-
  ## Purpose

  Generates a comprehensive financial report aggregating data across all departments, budgets, and fiscal periods. This endpoint provides executive-level financial insights including organizational spending patterns, budget performance, financial health indicators, and trend analysis. Essential for strategic planning and board-level reporting.

  ## Authentication

  **Required Role:** `finance_manager`, `admin`, `cfo`

  **Authentication Type:** Bearer Token

  **Header:** `Authorization: Bearer {{authToken}}`

  ## Request Parameters

  ### Query Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | fiscalYear | number | No | Filter by fiscal year (default: current year) |
  | startDate | string | No | Report start date (YYYY-MM-DD) |
  | endDate | string | No | Report end date (YYYY-MM-DD) |
  | departments | string | No | Comma-separated list of departments to include |
  | reportType | string | No | Report type (summary, detailed, executive) (default: summary) |
  | format | string | No | Response format (json, pdf, csv) (default: json) |
  | includeProjections | boolean | No | Include financial projections (default: true) |
  | includeComparisons | boolean | No | Include year-over-year comparisons (default: true) |

  ### Example Requests

  **Get current year financial report:**
  ```
  GET {{baseUrl}}/api/finance/reports/financial
  ```

  **Get detailed report for fiscal year 2024:**
  ```
  GET {{baseUrl}}/api/finance/reports/financial?fiscalYear=2024&reportType=detailed
  ```

  **Get executive summary for specific departments:**
  ```
  GET {{baseUrl}}/api/finance/reports/financial?departments=Engineering,Marketing,Sales&reportType=executive
  ```

  **Get report for date range:**
  ```
  GET {{baseUrl}}/api/finance/reports/financial?startDate=2024-01-01&endDate=2024-06-30
  ```

