  ### Error Responses

  **400 Bad Request** - Invalid parameters
  ```json
  {
    "error": "Invalid report parameters",
    "details": "Fiscal year must be between 2000 and 2100"
  }
  ```

  **400 Bad Request** - Invalid date range
  ```json
  {
    "error": "Invalid date range",
    "details": "End date must be after start date"
  }
  ```

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Authentication required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Insufficient permissions. Requires finance_manager, admin, or cfo role."
  }
  ```

  ## Response Fields

  | Field | Type | Description |
  |-------|------|-------------|
  | reportId | string | Unique report identifier |
  | reportType | string | Type of report generated |
  | fiscalYear | number | Fiscal year covered |
  | reportPeriod | object | Start and end dates |
  | organizationSummary | object | Organization-wide financial summary |
  | departmentSummaries | array | Summary for each department |
  | categoryBreakdown | array | Spending by category |
  | quarterlyPerformance | array | Quarterly spending trends |
  | financialProjections | object | Future spending projections |
  | yearOverYearComparison | object | Comparison with previous year |
  | keyMetrics | object | Key financial performance indicators |
  | topExpenses | array | Largest expense items |
  | alerts | array | Financial alerts and warnings |
  | recommendations | array | AI-generated recommendations |
  | executiveSummary | string | High-level summary for executives |
  | generatedAt | string | Report generation timestamp |
  | generatedBy | string | ID of user who generated report |
  | generatedByName | string | Name of user who generated report |

  ## Use Cases

  - **Executive Reporting**: Provide comprehensive financial overview to leadership
  - **Board Meetings**: Generate reports for board presentations
  - **Strategic Planning**: Use financial data for strategic decision-making
  - **Budget Planning**: Historical data for next year's budget planning
  - **Investor Relations**: Financial performance reporting for investors
  - **Audit Preparation**: Comprehensive financial documentation for audits
  - **Performance Review**: Evaluate organizational financial performance
  - **Trend Analysis**: Identify spending patterns and trends across the organization
