description: |-
  ## Purpose

  Retrieves detailed budget utilization metrics for a specific budget, showing how much has been spent versus allocated amounts. This endpoint provides comprehensive spending analysis, including breakdowns by time period, expense category, and variance analysis. Essential for budget monitoring and financial control.

  ## Authentication

  **Required Role:** `finance_manager`, `admin`, `department_manager`

  **Authentication Type:** Bearer Token

  **Header:** `Authorization: Bearer {{authToken}}`

  ## Request Parameters

  ### Path Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | id | string | Yes | The unique identifier of the budget |

  ### Query Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | startDate | string | No | Filter utilization from this date (YYYY-MM-DD) |
  | endDate | string | No | Filter utilization to this date (YYYY-MM-DD) |
  | groupBy | string | No | Group results by period (month, quarter, week) |

  ### Example Requests

  **Get current utilization:**
  ```
  GET {{baseUrl}}/api/finance/budgets/budget-123/utilization
  ```

  **Get utilization for specific period:**
  ```
  GET {{baseUrl}}/api/finance/budgets/budget-123/utilization?startDate=2024-01-01&endDate=2024-03-31
  ```

  **Get monthly breakdown:**
  ```
  GET {{baseUrl}}/api/finance/budgets/budget-123/utilization?groupBy=month
  ```

