  ### Error Responses

  **404 Not Found** - Budget does not exist
  ```json
  {
    "error": "Budget not found",
    "budgetId": "budget-123"
  }
  ```

  **400 Bad Request** - Invalid date range
  ```json
  {
    "error": "Invalid date range",
    "details": "End date must be after start date"
  }
  ```

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Authentication required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Insufficient permissions to view budget utilization"
  }
  ```

  ## Response Fields

  | Field | Type | Description |
  |-------|------|-------------|
  | budgetId | string | Unique budget identifier |
  | department | string | Department name |
  | fiscalYear | number | Fiscal year |
  | totalAllocated | number | Total budget allocated |
  | totalSpent | number | Total amount spent |
  | totalRemaining | number | Total remaining budget |
  | utilizationPercentage | number | Overall utilization percentage |
  | status | string | Budget status (on_track, at_risk, exceeded) |
  | projectedSpend | number | Projected total spend by end date |
  | projectedVariance | number | Projected variance from budget |
  | burnRate | number | Average spending rate per period |
  | averageMonthlySpend | number | Average monthly spending |
  | daysRemaining | number | Days remaining in budget period |
  | periodBreakdown | array | Spending breakdown by time period |
  | categoryBreakdown | array | Spending breakdown by category |
  | alerts | array | Budget alerts and warnings |
  | recommendations | array | AI-generated recommendations |
  | lastUpdated | string | Last update timestamp |

  ## Use Cases

  - **Budget Monitoring**: Track real-time budget utilization
  - **Variance Analysis**: Identify spending variances and trends
  - **Forecasting**: Project future spending based on current trends
  - **Expense Control**: Identify overspending categories
  - **Performance Review**: Evaluate budget management effectiveness
  - **Reallocation Decisions**: Identify opportunities to reallocate funds
