  ### Error Responses

  **404 Not Found** - No budgets found for department/year
  ```json
  {
    "error": "No budgets found",
    "department": "Engineering",
    "fiscalYear": 2024
  }
  ```

  **400 Bad Request** - Invalid fiscal year
  ```json
  {
    "error": "Invalid fiscal year",
    "details": "Fiscal year must be a valid 4-digit year"
  }
  ```

  **401 Unauthorized** - Missing or invalid authentication
  ```json
  {
    "error": "Authentication required"
  }
  ```

  **403 Forbidden** - Insufficient permissions
  ```json
  {
    "error": "Insufficient permissions to view department budget summary"
  }
  ```

  ## Response Fields

  | Field | Type | Description |
  |-------|------|-------------|
  | department | string | Department name |
  | fiscalYear | number | Fiscal year |
  | summary | object | Aggregated budget summary |
  | budgetsByCategory | array | Breakdown by budget category |
  | quarterlyTrends | array | Quarterly spending trends |
  | topExpenseCategories | array | Top expense categories |
  | performance | object | Performance metrics and status |
  | alerts | array | Department-level alerts |
  | comparisonToPreviousYear | object | Year-over-year comparison |
  | generatedAt | string | Report generation timestamp |

  ## Use Cases

  - **Department Review**: Comprehensive overview of department finances
  - **Executive Reporting**: High-level financial summaries for leadership
  - **Budget Planning**: Historical data for next year's budget planning
  - **Performance Evaluation**: Assess department financial management
  - **Comparative Analysis**: Compare department performance across years
  - **Resource Allocation**: Identify opportunities for budget optimization
