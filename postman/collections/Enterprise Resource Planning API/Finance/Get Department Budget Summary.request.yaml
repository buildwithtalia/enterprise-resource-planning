description: |-
  ## Purpose

  Retrieves a comprehensive budget summary for a specific department and fiscal year, aggregating all budgets across different categories. This endpoint provides a high-level overview of department financial performance, including total allocations, spending, and utilization metrics across all budget categories.

  ## Authentication

  **Required Role:** `finance_manager`, `admin`, `department_manager`

  **Authentication Type:** Bearer Token

  **Header:** `Authorization: Bearer {{authToken}}`

  ## Request Parameters

  ### Path Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | department | string | Yes | Name of the department (e.g., Engineering, Marketing) |
  | fiscalYear | number | Yes | Fiscal year (e.g., 2024) |

  ### Query Parameters

  | Parameter | Type | Required | Description |
  |-----------|------|----------|-------------|
  | includeDetails | boolean | No | Include detailed breakdown by category (default: false) |

  ### Example Requests

  **Get department summary:**
  ```
  GET {{baseUrl}}/api/finance/department/Engineering/fiscal-year/2024
  ```

  **Get detailed summary:**
  ```
  GET {{baseUrl}}/api/finance/department/Engineering/fiscal-year/2024?includeDetails=true
  ```

