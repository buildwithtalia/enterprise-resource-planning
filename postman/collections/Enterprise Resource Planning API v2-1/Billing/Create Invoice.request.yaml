$kind: http-request
description: Creates a new invoice for a customer.
url: "{{baseUrl}}/api/v2/billing/invoices"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "customerId": "cust_1234567890",
      "invoiceDate": "2024-01-15",
      "dueDate": "2024-02-15",
      "items": [
        {
          "description": "Professional Services",
          "quantity": 40,
          "unitPrice": 150.00,
          "amount": 6000.00
        }
      ],
      "subtotal": 6000.00,
      "tax": 480.00,
      "total": 6480.00
    }
order: 4000
