$kind: http-request
description: Retrieves a paginated list of all invoices with optional filtering.
url: "{{baseUrl}}/api/v2/billing/invoices?page=1&limit=20"
method: GET
queryParams:
  - key: page
    value: "1"
    description: Page number for pagination (1-indexed)
  - key: limit
    value: "20"
    description: Number of items per page
  - key: status
    value: ""
    disabled: true
    description: Filter by invoice status
  - key: customerId
    value: ""
    disabled: true
    description: Filter by customer ID
order: 3000
