$kind: http-request
description: Retrieves a paginated list of all customers in the billing system.
url: "{{baseUrl}}/api/v2/billing/customers?page=1&limit=20"
method: GET
queryParams:
  - key: page
    value: "1"
    description: Page number for pagination (1-indexed)
  - key: limit
    value: "20"
    description: Number of items per page
order: 1000
