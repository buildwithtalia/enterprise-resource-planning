$kind: http-request
description: Updates an existing employee's information in the HR system.
url: "{{baseUrl}}/api/v2/hr/employees/:id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  id: "{{employeeId}}"
body:
  type: text
  content: |-
    {
      "position": "Lead Software Engineer",
      "salary": 105000.00,
      "department": "Engineering",
      "status": "active"
    }
order: 4000
