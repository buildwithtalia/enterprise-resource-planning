$kind: http-request
description: Retrieves a paginated list of all departments in the organization.
url: "{{baseUrl}}/api/v2/hr/departments?page=1&limit=20"
method: GET
queryParams:
  - key: page
    value: "1"
    description: Page number for pagination (1-indexed)
  - key: limit
    value: "20"
    description: Number of items per page
order: 8000
