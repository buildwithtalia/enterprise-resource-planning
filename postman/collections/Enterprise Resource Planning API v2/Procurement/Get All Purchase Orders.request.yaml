$kind: http-request
description: Retrieves a paginated list of all purchase orders with optional filtering.
url: "{{baseUrl}}/api/v2/procurement/purchase-orders?page=1&limit=20"
method: GET
queryParams:
  - key: page
    value: "1"
    description: Page number for pagination (1-indexed)
  - key: limit
    value: "20"
    description: Number of items per page
  - key: status
    value: ""
    disabled: true
    description: Filter by purchase order status
order: 3000
