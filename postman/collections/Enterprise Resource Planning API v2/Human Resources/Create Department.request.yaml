$kind: http-request
description: Creates a new department in the HR system.
url: "{{baseUrl}}/api/v2/hr/departments"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Engineering",
      "description": "Software development and engineering team",
      "managerId": "emp_1234567890",
      "budget": 500000.00
    }
order: 9000
