$kind: http-request
description: Updates an existing shipment's details including carrier, tracking number, status, and estimated delivery date.
url: "{{baseUrl}}/api/v2/supply-chain/shipments/:id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  id: "{{shipmentId}}"
body:
  type: json
  content: |-
    {
      "carrier": "{{carrier}}",
      "trackingNumber": "{{trackingNumber}}",
      "status": "in_transit",
      "estimatedDeliveryDate": "{{estimatedDeliveryDate}}"
    }
scripts:
  - type: afterResponse
    code: |-
      // Validate response status
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      // Parse response
      const jsonData = pm.response.json();

      // Validate response structure
      pm.test("Response has success property", function () {
          pm.expect(jsonData).to.have.property('success');
          pm.expect(jsonData.success).to.be.true;
      });

      pm.test("Response has data property", function () {
          pm.expect(jsonData).to.have.property('data');
      });

      // Validate updated shipment data
      if (jsonData.data) {
          pm.test("Shipment has required fields", function () {
              pm.expect(jsonData.data).to.have.property('id');
              pm.expect(jsonData.data).to.have.property('carrier');
              pm.expect(jsonData.data).to.have.property('trackingNumber');
              pm.expect(jsonData.data).to.have.property('status');
              pm.expect(jsonData.data).to.have.property('estimatedDeliveryDate');
          });
          
          // Extract and save updated data to collection variables
          pm.collectionVariables.set("updatedShipmentId", jsonData.data.id);
          pm.collectionVariables.set("updatedCarrier", jsonData.data.carrier);
          pm.collectionVariables.set("updatedTrackingNumber", jsonData.data.trackingNumber);
          pm.collectionVariables.set("updatedStatus", jsonData.data.status);
          pm.collectionVariables.set("updatedEstimatedDeliveryDate", jsonData.data.estimatedDeliveryDate);
          
          console.log("Updated Shipment ID:", jsonData.data.id);
          console.log("Updated Status:", jsonData.data.status);
      }
    language: text/javascript
order: 4000
