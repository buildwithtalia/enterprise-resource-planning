$kind: http-request
description: Updates an existing inventory item.
url: "{{baseUrl}}/api/v2/inventory/items/:id"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  id: ""
body:
  type: text
  content: |-
    {
      "quantity": 45,
      "unitPrice": 1150.00,
      "location": "Warehouse A, Shelf 15"
    }
order: 4000
