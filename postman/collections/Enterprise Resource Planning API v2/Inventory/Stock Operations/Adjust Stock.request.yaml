$kind: http-request
description: Adjust stock quantity up or down for an inventory item.
url: '{{baseUrl}}/api/v2/inventory/stock/adjust'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "itemId": "item-001",
      "adjustmentType": "decrease",
      "quantity": 5,
      "reason": "Damaged items removed from inventory"
    }
order: 1000
