$kind: http-request
description: Fulfill a stock reservation, removing reserved stock from inventory.
url: '{{baseUrl}}/api/v2/inventory/stock/fulfill'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "reservationId": "res-123",
      "itemId": "item-001",
      "quantity": 10
    }
order: 4000
