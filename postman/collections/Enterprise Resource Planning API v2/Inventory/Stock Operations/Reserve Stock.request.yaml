$kind: http-request
description: Reserve stock for a specific order.
url: '{{baseUrl}}/api/v2/inventory/stock/reserve'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "itemId": "item-001",
      "quantity": 10,
      "orderId": "order-456"
    }
order: 2000
