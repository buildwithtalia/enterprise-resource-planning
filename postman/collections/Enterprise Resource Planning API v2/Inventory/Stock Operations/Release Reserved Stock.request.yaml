$kind: http-request
description: Release a previously reserved stock reservation.
url: '{{baseUrl}}/api/v2/inventory/stock/release'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "reservationId": "res-123",
      "itemId": "item-001",
      "quantity": 10
    }
order: 3000
