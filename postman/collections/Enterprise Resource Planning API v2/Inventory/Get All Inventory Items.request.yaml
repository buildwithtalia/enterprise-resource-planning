$kind: http-request
description: Retrieves a paginated list of all inventory items with optional filtering.
url: "{{baseUrl}}/api/v2/inventory/items?page=1&limit=20"
method: GET
queryParams:
  - key: page
    value: "1"
    description: Page number for pagination (1-indexed)
  - key: limit
    value: "20"
    description: Number of items per page
  - key: category
    value: ""
    disabled: true
    description: Filter by item category
order: 1000
