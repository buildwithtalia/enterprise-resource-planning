# ERP Microservices — Kubernetes manifests
# One Deployment + Service (ClusterIP) per microservice.
# The API Gateway is exposed via a LoadBalancer Service on port 80.
#
# Env vars for inter-service communication use Kubernetes DNS:
#   http://<service-name>.<namespace>.svc.cluster.local:<port>

---
# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: erp

---
# ── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-config
  namespace: erp
data:
  LOG_LEVEL: "info"
  HR_SERVICE_URL: "http://hr-service:3011"
  PAYROLL_SERVICE_URL: "http://payroll-service:3012"
  ACCOUNTING_SERVICE_URL: "http://accounting-service:3013"
  FINANCE_SERVICE_URL: "http://finance-service:3014"
  BILLING_SERVICE_URL: "http://billing-service:3015"
  PROCUREMENT_SERVICE_URL: "http://procurement-service:3016"
  SUPPLY_CHAIN_SERVICE_URL: "http://supply-chain-service:3017"
  INVENTORY_SERVICE_URL: "http://inventory-service:3018"

---
# ════════════════════════════════════════════════════════════════
# API GATEWAY  (port 3010 → external 80)
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: erp
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: erp/gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3010
        envFrom:
        - configMapRef:
            name: erp-config
        env:
        - name: PORT
          value: "3010"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3010
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3010
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: erp
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
  - port: 80
    targetPort: 3010
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: erp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

